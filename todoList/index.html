<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="css/App.css">
    <link rel="stylesheet" href="css/Header.css">
    <link rel="stylesheet" href="css/Editor.css">
    <link rel="stylesheet" href="css/List.css">
    <link rel="stylesheet" href="css/TodoItem.css">
</head>
<body>
    <div class="App">
        <div class="Header"><h3>오늘의 Plan 😊</h3><h1></h1></div>
        <form action="">
            <div class="Editor">
                <input type="text" class="Input" placeholder="새로운 todo" />
                <button class="Button">추가</button>
            </div>
        </form>
        <div class="List">
            <h4>Todo List 🌱</h4>
            <input id="keyword" type="text" class="Input" placeholder="검색어를 입력해주세요." />
            <div class="todos_wrapper">
            </div>
        </div>
    </div>
</body>
<script src="js/todolist.js" defer></script>
</html>
